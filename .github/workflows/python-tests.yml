name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 opencrypto/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 opencrypto/ --count --max-line-length=120 --statistics --exit-zero

      - name: Type check with mypy
        run: |
          pip install mypy pandas-stubs types-requests
          mypy opencrypto/ --ignore-missing-imports --no-error-summary || true

      - name: Run tests
        run: pytest tests/ -v --tb=short
